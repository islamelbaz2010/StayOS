name: CI

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  backend:
    name: Backend — Lint, Type Check, Security, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.3-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stayos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/

      - name: Security check with bandit
        run: bandit -r src/ -ll

      - name: Dependency vulnerability scan
        run: safety check

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/stayos_test
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/stayos_test
          REDIS_URL: redis://localhost:6379/1
        run: pytest src/ --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to PR
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('coverage.xml')) {
              const coverage = fs.readFileSync('coverage.xml', 'utf8');
              // Parse and comment coverage summary on PR
            }

  frontend:
    name: Frontend — Lint, Type Check, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm dependencies
        uses: actions/cache@v3
        with:
          path: apps/web/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install

      - name: Lint with ESLint
        working-directory: apps/web
        run: pnpm lint

      - name: Type check with TypeScript
        working-directory: apps/web
        run: pnpm type-check

      - name: Build Next.js
        working-directory: apps/web
        run: pnpm build
