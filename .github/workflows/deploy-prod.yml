name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to ECS Production
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: me-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: stayos-prod-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infra/docker/api/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Run Alembic migrations
        run: |
          aws ecs run-task \
            --cluster stayos-prod-cluster \
            --task-definition stayos-prod-migrations \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-xxx],securityGroups=[sg-xxx],assignPublicIp=DISABLED}" \
            --overrides "containerOverrides=[{name=migrations,command=[alembic,upgrade,head]}]"

      - name: Update ECS API service
        run: |
          aws ecs update-service \
            --cluster stayos-prod-cluster \
            --service stayos-prod-api \
            --force-new-deployment

      - name: Update ECS worker service
        run: |
          aws ecs update-service \
            --cluster stayos-prod-cluster \
            --service stayos-prod-worker \
            --force-new-deployment

      - name: Wait for services stable
        run: |
          aws ecs wait services-stable \
            --cluster stayos-prod-cluster \
            --services stayos-prod-api stayos-prod-worker

      - name: Smoke test
        run: |
          curl -f https://api.stayos.com/health || exit 1

      - name: Deploy Next.js to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Notify Sentry
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: stayos
          SENTRY_PROJECT: stayos-api
        with:
          environment: production
